kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "java -jar /home/runner/workspace/java-backend/target/page-replacement-1.0.0.jar"

[services.production]

[services.production.build]
args = ["sh", "-c", "cd /home/runner/workspace/java-backend && mvn clean package -DskipTests -q"]

[services.production.build.env]
JAVA_TOOL_OPTIONS = "-Xmx512m"

[services.production.run]
args = ["java", "-jar", "/home/runner/workspace/java-backend/target/page-replacement-1.0.0.jar"]

[services.production.run.env]
JAVA_TOOL_OPTIONS = "-Xmx512m"

[services.production.health.startup]
path = "/api/healthz"
